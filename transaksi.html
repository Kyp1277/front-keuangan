<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transaksi — KeuanganKu UMKM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/shared.css" />
</head>
<body>
  <div id="sidebar-placeholder"></div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title">💳 Manajemen Transaksi</div>
      <div class="topbar-right">
        <button class="btn btn-primary" id="btnTambah">+ Tambah Transaksi</button>
      </div>
    </div>

    <div class="page-content">

      <!-- Stat mini -->
      <div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
        <div class="stat-card">
          <div class="stat-label">Pemasukan (filter)</div>
          <div class="stat-value stat-green" id="miniMasuk">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Pengeluaran (filter)</div>
          <div class="stat-value stat-red" id="miniKeluar">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Saldo (filter)</div>
          <div class="stat-value stat-blue" id="miniSaldo">—</div>
        </div>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <div class="filter-item" style="flex:1;min-width:180px;">
          <span class="filter-label">Cari</span>
          <input type="text" id="filterQ" class="form-control" placeholder="Keterangan / kategori..." />
        </div>
        <div class="filter-item">
          <span class="filter-label">Jenis</span>
          <select id="filterJenis" class="form-control">
            <option value="">Semua</option>
            <option value="pemasukan">Pemasukan</option>
            <option value="pengeluaran">Pengeluaran</option>
          </select>
        </div>
        <div class="filter-item">
          <span class="filter-label">Bulan</span>
          <input type="month" id="filterBulan" class="form-control" />
        </div>
        <button class="btn btn-primary" id="btnFilter">Filter</button>
        <button class="btn btn-secondary" id="btnReset">Reset</button>
      </div>

      <!-- Table -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Daftar Transaksi</span>
          <span id="totalLabel" style="font-size:.8rem;color:#94a3b8;"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>No</th>
                <th>Tanggal</th>
                <th>Kategori</th>
                <th>Keterangan</th>
                <th>Jenis</th>
                <th style="text-align:right">Jumlah</th>
                <th style="text-align:center">Aksi</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="7" style="text-align:center;padding:2rem;color:#94a3b8;">Memuat data...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Tambah / Edit -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Tambah Transaksi</span>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="alert alert-error" id="modalAlert"></div>
        <input type="hidden" id="editId" />

        <div class="form-group">
          <label class="form-label">Tanggal *</label>
          <input type="date" id="fTanggal" class="form-control" required />
        </div>
        <div class="form-group">
          <label class="form-label">Jenis *</label>
          <select id="fJenis" class="form-control" required>
            <option value="">-- Pilih Jenis --</option>
            <option value="pemasukan">Pemasukan</option>
            <option value="pengeluaran">Pengeluaran</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Kategori *</label>
          <select id="fKategori" class="form-control" required>
            <option value="">-- Pilih Kategori --</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Jumlah (Rp) *</label>
          <input type="number" id="fJumlah" class="form-control" min="1" placeholder="Contoh: 500000" required />
        </div>
        <div class="form-group">
          <label class="form-label">Keterangan</label>
          <input type="text" id="fKeterangan" class="form-control" placeholder="Opsional" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btnCancel">Batal</button>
        <button class="btn btn-primary" id="btnSave">
          <span id="btnSaveText">Simpan</span>
        </button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/sidebar.js"></script>
  <script>
    requireAuth();
    renderSidebar("transaksi");

    // Set default bulan = bulan ini
    document.getElementById("filterBulan").value = new Date().toISOString().slice(0, 7);

    let allKategori = [];

    // ====== LOAD DATA ======
    async function loadTransaksi() {
      const q     = document.getElementById("filterQ").value;
      const jenis = document.getElementById("filterJenis").value;
      const bulan = document.getElementById("filterBulan").value;

      const params = new URLSearchParams();
      if (q)     params.append("q",     q);
      if (jenis) params.append("jenis", jenis);
      if (bulan) params.append("bulan", bulan);

      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem;color:#94a3b8;">Memuat...</td></tr>`;

      const res = await apiFetch(`/api/transaksi.php?${params}`);
      if (!res || res.status !== "success") return;

      const { transaksi, statistik, total } = res.data;

      // Update mini stat
      document.getElementById("miniMasuk").textContent  = formatRupiah(statistik.total_masuk);
      document.getElementById("miniKeluar").textContent = formatRupiah(statistik.total_keluar);
      document.getElementById("miniSaldo").textContent  = formatRupiah(statistik.saldo);
      document.getElementById("totalLabel").textContent = `${total} transaksi ditemukan`;

      if (transaksi.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">Tidak ada transaksi</div><div class="empty-sub">Coba ubah filter atau tambah transaksi baru</div></div></td></tr>`;
        return;
      }

      tbody.innerHTML = transaksi.map((t, i) => `
        <tr>
          <td style="color:#94a3b8">${i + 1}</td>
          <td>${formatTanggal(t.tanggal)}</td>
          <td>${t.nama_kategori || '—'}</td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${t.keterangan || ''}">${t.keterangan || '—'}</td>
          <td>
            <span class="badge ${t.jenis === 'pemasukan' ? 'badge-green' : 'badge-red'}">
              ${t.jenis === 'pemasukan' ? '↑ Pemasukan' : '↓ Pengeluaran'}
            </span>
          </td>
          <td style="text-align:right;font-weight:700;color:${t.jenis === 'pemasukan' ? '#16a34a' : '#dc2626'}">
            ${t.jenis === 'pemasukan' ? '+' : '-'}${formatRupiah(t.jumlah)}
          </td>
          <td style="text-align:center">
            <div style="display:flex;gap:.4rem;justify-content:center">
              <button class="btn btn-warning btn-sm" onclick="openEdit(${JSON.stringify(t).replace(/"/g,'&quot;')})">✏️ Edit</button>
              <button class="btn btn-danger btn-sm" onclick="hapus(${t.id})">🗑️</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    // ====== LOAD KATEGORI ======
    async function loadKategori(filterJenis = '') {
      const endpoint = filterJenis
        ? `/api/kategori.php?jenis=${filterJenis}`
        : `/api/kategori.php`;
      const res = await apiFetch(endpoint);
      if (res && res.status === "success") {
        allKategori = res.data;
        updateKategoriOptions(filterJenis);
      }
    }

    function updateKategoriOptions(filterJenis = '') {
      const sel = document.getElementById("fKategori");
      const filtered = filterJenis
        ? allKategori.filter(k => k.jenis === filterJenis)
        : allKategori;

      sel.innerHTML = '<option value="">-- Pilih Kategori --</option>' +
        filtered.map(k => `<option value="${k.id}">${k.nama_kategori}</option>`).join('');
    }

    // Update kategori saat jenis berubah di form
    document.getElementById("fJenis").addEventListener("change", function() {
      updateKategoriOptions(this.value);
    });

    // ====== MODAL TAMBAH ======
    document.getElementById("btnTambah").addEventListener("click", () => {
      document.getElementById("modalTitle").textContent = "Tambah Transaksi";
      document.getElementById("editId").value = "";
      document.getElementById("fTanggal").value = new Date().toISOString().slice(0,10);
      document.getElementById("fJenis").value = "";
      document.getElementById("fKategori").value = "";
      document.getElementById("fJumlah").value = "";
      document.getElementById("fKeterangan").value = "";
      document.getElementById("modalAlert").classList.remove("show");
      loadKategori();
      document.getElementById("modalOverlay").classList.add("show");
    });

    // ====== MODAL EDIT ======
    function openEdit(t) {
      document.getElementById("modalTitle").textContent = "Edit Transaksi";
      document.getElementById("editId").value = t.id;
      document.getElementById("fTanggal").value = t.tanggal;
      document.getElementById("fJenis").value = t.jenis;
      document.getElementById("fJumlah").value = t.jumlah;
      document.getElementById("fKeterangan").value = t.keterangan || '';
      document.getElementById("modalAlert").classList.remove("show");
      loadKategori(t.jenis).then(() => {
        document.getElementById("fKategori").value = t.kategori_id;
      });
      document.getElementById("modalOverlay").classList.add("show");
    }

    // ====== CLOSE MODAL ======
    ["modalClose", "btnCancel"].forEach(id => {
      document.getElementById(id).addEventListener("click", () => {
        document.getElementById("modalOverlay").classList.remove("show");
      });
    });

    // ====== SIMPAN (TAMBAH / EDIT) ======
    document.getElementById("btnSave").addEventListener("click", async () => {
      const alertEl  = document.getElementById("modalAlert");
      const btnSave  = document.getElementById("btnSave");
      const btnText  = document.getElementById("btnSaveText");
      alertEl.classList.remove("show");

      const id          = document.getElementById("editId").value;
      const tanggal     = document.getElementById("fTanggal").value;
      const jenis       = document.getElementById("fJenis").value;
      const kategori_id = parseInt(document.getElementById("fKategori").value);
      const jumlah      = parseFloat(document.getElementById("fJumlah").value);
      const keterangan  = document.getElementById("fKeterangan").value;

      if (!tanggal || !jenis || !kategori_id || !jumlah) {
        alertEl.textContent = "Harap isi semua field wajib (*)";
        alertEl.classList.add("show");
        return;
      }

      btnSave.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span>Menyimpan...';

      const method = id ? "PUT" : "POST";
      const body   = id
        ? { id: parseInt(id), tanggal, jenis, kategori_id, jumlah, keterangan }
        : { tanggal, jenis, kategori_id, jumlah, keterangan };

      const res = await apiFetch("/api/transaksi.php", method, body);

      btnSave.disabled = false;
      btnText.textContent = "Simpan";

      if (res && res.status === "success") {
        document.getElementById("modalOverlay").classList.remove("show");
        loadTransaksi();
      } else {
        alertEl.textContent = res?.message || "Gagal menyimpan.";
        alertEl.classList.add("show");
      }
    });

    // ====== HAPUS ======
    async function hapus(id) {
      if (!confirm("Yakin ingin menghapus transaksi ini?")) return;
      const res = await apiFetch(`/api/transaksi.php?id=${id}`, "DELETE");
      if (res && res.status === "success") {
        loadTransaksi();
      } else {
        alert(res?.message || "Gagal menghapus.");
      }
    }

    // ====== FILTER ======
    document.getElementById("btnFilter").addEventListener("click", loadTransaksi);
    document.getElementById("btnReset").addEventListener("click", () => {
      document.getElementById("filterQ").value     = "";
      document.getElementById("filterJenis").value = "";
      document.getElementById("filterBulan").value = new Date().toISOString().slice(0, 7);
      loadTransaksi();
    });

    // ====== INIT ======
    loadTransaksi();
    loadKategori();
  </script>
</body>
</html>
