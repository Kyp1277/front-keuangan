<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — KeuanganKu UMKM</title>
  <meta name="description" content="Login ke sistem keuangan UMKM Anda" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      padding: 1rem;
    }
    /* Animated background dots */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(rgba(99,102,241,0.15) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .card {
      width: 100%; max-width: 900px;
      display: grid; grid-template-columns: 1fr 420px;
      background: #1e293b;
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.07);
    }
    @media (max-width: 700px) {
      .card { grid-template-columns: 1fr; }
      .card-left { display: none; }
    }

    /* Left panel */
    .card-left {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      padding: 2.5rem;
      display: flex; flex-direction: column; justify-content: space-between;
      position: relative; overflow: hidden;
    }
    .card-left::after {
      content: '';
      position: absolute; bottom: -60px; right: -60px;
      width: 220px; height: 220px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }
    .brand { display: flex; align-items: center; gap: .75rem; }
    .brand-icon {
      width: 44px; height: 44px; border-radius: .75rem;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
    }
    .brand-name { color: #fff; font-weight: 700; font-size: 1.1rem; }
    .left-title {
      color: #fff; font-size: 1.7rem; font-weight: 800;
      line-height: 1.3; margin-top: 2rem;
    }
    .left-subtitle {
      color: rgba(255,255,255,0.75); font-size: .9rem;
      line-height: 1.6; margin-top: .75rem;
    }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .stat-card {
      background: rgba(255,255,255,0.12);
      border-radius: .875rem; padding: 1rem;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .stat-label { color: rgba(255,255,255,0.6); font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    .stat-value { color: #fff; font-size: 1.4rem; font-weight: 800; margin-top: .25rem; }

    /* Right panel */
    .card-right { padding: 2.5rem; }
    .form-title { color: #f1f5f9; font-size: 1.5rem; font-weight: 800; margin-bottom: .25rem; }
    .form-subtitle { color: #94a3b8; font-size: .875rem; margin-bottom: 2rem; }

    .alert {
      padding: .875rem 1rem;
      border-radius: .75rem;
      font-size: .875rem;
      margin-bottom: 1.25rem;
      display: none;
    }
    .alert.error { background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; }
    .alert.success { background: rgba(34,197,94,.15); border: 1px solid rgba(34,197,94,.3); color: #86efac; }
    .alert.show { display: block; }

    label { display: block; color: #cbd5e1; font-size: .8rem; font-weight: 600; margin-bottom: .4rem; }
    .input-wrap { position: relative; margin-bottom: 1.1rem; }
    .input-icon {
      position: absolute; left: .875rem; top: 50%; transform: translateY(-50%);
      color: #64748b; pointer-events: none;
    }
    input {
      width: 100%; background: #0f172a;
      border: 1px solid #334155; border-radius: .75rem;
      padding: .75rem .875rem .75rem 2.75rem;
      color: #f1f5f9; font-size: .9rem; font-family: inherit;
      outline: none; transition: border .2s, box-shadow .2s;
    }
    input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.2); }

    .btn-submit {
      width: 100%; padding: .875rem;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff; font-family: inherit; font-weight: 700;
      font-size: .95rem; border: none; border-radius: .75rem;
      cursor: pointer; transition: opacity .2s, transform .2s;
      margin-top: .5rem;
    }
    .btn-submit:hover { opacity: .9; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; }

    .divider { text-align: center; margin: 1.25rem 0; color: #475569; font-size: .8rem; }
    .link-text { text-align: center; color: #94a3b8; font-size: .85rem; margin-top: .75rem; }
    .link-text a { color: #818cf8; font-weight: 600; text-decoration: none; }
    .link-text a:hover { text-decoration: underline; }

    /* Loading spinner */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .6s linear infinite; margin-right: .5rem;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <!-- Kiri -->
    <div class="card-left">
      <div>
        <div class="brand">
          <div class="brand-icon">💰</div>
          <span class="brand-name">KeuanganKu</span>
        </div>
        <h1 class="left-title">Kelola keuangan UMKM dengan mudah & rapi</h1>
        <p class="left-subtitle">Catat pemasukan, pengeluaran, dan lihat laporan keuangan usaha Anda dalam satu dashboard.</p>
      </div>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-label">Fitur</div>
          <div class="stat-value">CRUD</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Laporan</div>
          <div class="stat-value">Grafik</div>
        </div>
      </div>
    </div>

    <!-- Kanan -->
    <div class="card-right">
      <div class="form-title">Masuk ke Akun</div>
      <div class="form-subtitle">Gunakan username & password yang sudah terdaftar</div>

      <div class="alert error" id="alertError"></div>
      <div class="alert success" id="alertSuccess"></div>

      <form id="loginForm">
        <div>
          <label for="username">Username</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="username" placeholder="Masukkan username" required />
          </div>
        </div>
        <div>
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" placeholder="Masukkan password" required />
          </div>
        </div>
        <button type="submit" class="btn-submit" id="btnLogin">Masuk Sekarang</button>
      </form>

      <p class="link-text">Belum punya akun? <a href="register.html">Daftar di sini</a></p>
      <div class="divider">Demo: admin / password</div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Jika sudah login, langsung ke dashboard
    redirectIfLoggedIn();

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const btn = document.getElementById("btnLogin");
      const errEl = document.getElementById("alertError");
      const okEl  = document.getElementById("alertSuccess");

      errEl.classList.remove("show");
      okEl.classList.remove("show");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Memproses...';

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      try {
        const res = await apiFetch("/api/login.php", "POST", { username, password });

        if (res.status === "success") {
          // Simpan token & data user
          localStorage.setItem("token", res.data.token);
          localStorage.setItem("user", JSON.stringify(res.data.user));

          okEl.textContent = res.message;
          okEl.classList.add("show");

          setTimeout(() => (window.location.href = "dashboard.html"), 800);
        } else {
          errEl.textContent = res.message;
          errEl.classList.add("show");
          btn.disabled = false;
          btn.textContent = "Masuk Sekarang";
        }
      } catch {
        errEl.textContent = "Gagal terhubung ke server. Cek koneksi internet.";
        errEl.classList.add("show");
        btn.disabled = false;
        btn.textContent = "Masuk Sekarang";
      }
    });
  </script>
</body>
</html>
